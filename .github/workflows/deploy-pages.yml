name: Deploy Pages

# Deployment is done locally via `yarn deploy` (requires Philips VPN for @filament packages).
# This workflow runs type-check only as a CI safety net on pull requests.
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
